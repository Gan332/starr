# Android NDK cross-compilation targets.
#
# Linker is NOT configured here. It is injected at build time via the
# CARGO_TARGET_<TRIPLE>_LINKER environment variable by:
#   - rust/build-android.ps1  (Windows)
#   - rust/build-android.sh   (Linux / macOS / CI)
#
# Always build via those scripts or via `./gradlew :app:buildRust`.
# Running `cargo build --target <android-triple>` directly will fail to link
# unless you set the CARGO_TARGET_*_LINKER variable yourself.
